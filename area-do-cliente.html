<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Área do Cliente | DOPPIO Arquitetura</title>
  <meta name="robots" content="noindex, nofollow" />
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; }
    .wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .card { max-width: 720px; width: 100%; border: 1px solid #e6e6e6; border-radius: 16px; padding: 22px; }
    h1 { margin: 0 0 10px; font-size: 22px; }
    p { margin: 0 0 14px; line-height: 1.5; color: #222; }
    a { color: inherit; }
    .actions { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 14px; }
    .btn { display: inline-block; padding: 10px 14px; border-radius: 12px; border: 1px solid #ddd; text-decoration: none; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Área do Cliente</h1>
      <p>Estamos finalizando o portal. Em breve você poderá acompanhar etapas, arquivos e atualizações do seu projeto por aqui.</p>
      <div class="actions">
        <a class="btn" href="index.html">Voltar para o site</a>
      </div>
    </div>
  </div>
</body>
</html>
